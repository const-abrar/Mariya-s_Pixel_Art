<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broken Corner</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e0e5ec;
        font-family: 'Segoe UI', sans-serif;
    }

    .container {
        text-align: center;
    }

    h1 {
        margin-bottom: 30px;
        color: #333;
    }

    .btn {
        display: block;
        width: 220px;
        margin: 15px auto;
        padding: 15px;
        border-radius: 12px;
        background: #e0e5ec;
        box-shadow: 
            6px 6px 12px #b8bcc2,
            -6px -6px 12px #ffffff;
        text-decoration: none;
        color: #333;
        font-weight: 600;
        transition: 0.2s ease;
    }

    .btn:hover {
        box-shadow: 
            inset 6px 6px 12px #b8bcc2,
            inset -6px -6px 12px #ffffff;
    }

    .btn:active {
        transform: scale(0.97);
    }
</style>

</head>
<body>

<div class="container">
    <h1>Ek tool banaya hai hum ne pata nahi aapka zarurat ka hai ya nahi bas bana diya aapke liye...</h1>

    <a href="pixelart/" class="btn">🎨 Pixel Art</a>
</div>

</body>
</html>
